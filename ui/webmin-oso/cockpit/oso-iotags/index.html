<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSOlogic — I/O Tags</title>
<script src="../base/cockpit.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@patternfly/patternfly@5/patternfly.min.css" crossorigin>
<style>
  :root {
    --oso-red:  #800000;
    --oso-red2: #a00000;
    --oso-red3: #600000;
  }

  /* Header */
  .oso-header {
    background: #1c1c1c;
    border-bottom: 3px solid var(--oso-red3);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 0;
  }
  .oso-header h1 { font-size:17px; font-weight:700; color:#e0e0e0; margin:0 }
  .oso-header .sub { font-size:11px; color:#666; margin-top:2px }
  .ws-dot { width:9px; height:9px; border-radius:50%; background:#555; margin-left:auto; flex-shrink:0 }
  .ws-dot.ok  { background:#22c55e }
  .ws-dot.err { background:#ef4444 }

  /* Layout: sidebar + main */
  .layout { display:flex; height:calc(100vh - 54px); overflow:hidden }

  /* Group sidebar */
  .sidebar {
    width: 200px;
    flex-shrink: 0;
    background: #161616;
    border-right: 1px solid #2a2a2a;
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar-title {
    font-size:10px; font-weight:700; letter-spacing:.08em;
    text-transform:uppercase; color:#555;
    padding: 0 14px 8px;
  }
  .group-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 14px;
    cursor: pointer;
    font-size: 13px;
    color: #aaa;
    border-left: 3px solid transparent;
  }
  .group-item:hover { background:#1e1e1e; color:#e0e0e0 }
  .group-item.active { background:#1e1e1e; color:#e0e0e0; border-left-color:var(--oso-red) }
  .group-count {
    font-size:10px; background:#2a2a2a; border-radius:10px;
    padding:1px 7px; color:#666;
  }

  /* Main panel */
  .main { flex:1; display:flex; flex-direction:column; overflow:hidden }

  /* Toolbar */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    flex-wrap: wrap;
  }
  .toolbar input[type=text] {
    background: #252525;
    border: 1px solid #333;
    border-radius: 4px;
    color: #e0e0e0;
    padding: 6px 12px;
    font-size: 13px;
    font-family: inherit;
    width: 240px;
  }
  .toolbar input[type=text]:focus { outline:none; border-color:var(--oso-red) }
  .type-filter {
    background: #252525;
    border: 1px solid #333;
    border-radius: 4px;
    color: #aaa;
    padding: 5px 10px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  .toolbar-right { margin-left:auto; display:flex; align-items:center; gap:10px }
  .tag-count { font-size:11px; color:#555 }

  /* Toggle: show all vs changed only */
  .toggle-btn {
    background: #252525;
    border: 1px solid #333;
    border-radius: 4px;
    color: #aaa;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
  }
  .toggle-btn.active { border-color:var(--oso-red); color:#e0e0e0 }

  /* Tag table */
  .table-wrap { flex:1; overflow-y:auto }
  table { width:100%; border-collapse:collapse; font-size:13px }
  thead th {
    background: #1a1a1a;
    padding: 8px 12px;
    text-align: left;
    font-size:10px; font-weight:700; letter-spacing:.06em;
    text-transform:uppercase; color:#555;
    position: sticky; top:0; z-index:1;
    border-bottom: 1px solid #2a2a2a;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color:#aaa }
  thead th.sort-asc::after  { content: ' ▲'; font-size:8px }
  thead th.sort-desc::after { content: ' ▼'; font-size:8px }
  tbody tr { border-bottom:1px solid #1e1e1e }
  tbody tr:hover { background:#1a1a1a }
  tbody tr.flash { background:#292100 }
  td { padding:7px 12px; vertical-align:middle }

  .td-name  { font-family:monospace; font-size:12px; color:#93c5fd }
  .td-group { font-size:11px; color:#555 }
  .td-type  {
    font-family:monospace; font-size:10px;
    background:#252525; border-radius:3px;
    padding:2px 6px; color:#666; white-space:nowrap;
  }

  /* Value cell */
  .val-wrap { display:flex; align-items:center; gap:8px }
  .val-text  { font-family:monospace; font-variant-numeric:tabular-nums }
  .val-true  { color:#22c55e }
  .val-false { color:#444 }
  .val-num   { color:#e0e0e0 }
  .val-str   { color:#fde68a }

  /* Bool toggle */
  .bool-toggle {
    width: 36px; height: 20px;
    background: #333; border-radius: 10px;
    position:relative; cursor:pointer; flex-shrink:0;
    border: none; transition:background .2s;
  }
  .bool-toggle::after {
    content:'';
    position:absolute; top:3px; left:3px;
    width:14px; height:14px; border-radius:50%;
    background:#666; transition:left .2s, background .2s;
  }
  .bool-toggle.on { background:#14532d }
  .bool-toggle.on::after { left:19px; background:#22c55e }

  /* Inline edit */
  .val-input {
    background:#252525; border:1px solid var(--oso-red);
    border-radius:3px; color:#e0e0e0;
    font-family:monospace; font-size:13px;
    padding:2px 8px; width:120px;
  }
  .val-input:focus { outline:none }
  .btn-ok  { background:var(--oso-red); color:#fff; border:none; border-radius:3px; padding:3px 10px; cursor:pointer; font-size:12px }
  .btn-ok:hover { background:var(--oso-red2) }
  .btn-x   { background:#333; color:#aaa; border:none; border-radius:3px; padding:3px 8px; cursor:pointer; font-size:12px }

  .td-age  { font-size:10px; color:#444; font-variant-numeric:tabular-nums }
  .btn-edit {
    background:transparent; border:1px solid #333; color:#555;
    padding:3px 8px; border-radius:3px; cursor:pointer; font-size:11px;
  }
  .btn-edit:hover { border-color:var(--oso-red); color:#aaa }

  /* Empty state */
  .empty { color:#555; text-align:center; padding:40px }
</style>
</head>

<script>
const BASE = '/api/v1';
const WS_URL = `ws://${location.host}/ws`;

// ── State ──────────────────────────────────────────────────
let allTags     = {};       // id → tag
let groups      = new Set();
let activeGroup = null;     // null = all
let sortKey     = 'name';
let sortDir     = 1;        // 1 asc, -1 desc
let changedOnly = false;
let recentIds   = new Set(); // tags updated in last 5s
let editingId   = null;
let ws          = null;

// ── Boot ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  fetchTags();
  connectWS();
});

// ── REST ───────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function fetchTags() {
  try {
    const list = await api('GET', '/tags');
    allTags = {};
    groups = new Set(['(all)']);
    list.forEach(t => {
      allTags[t.id] = t;
      if (t.group) groups.add(t.group);
    });
    renderGroups();
    applyFilters();
    document.getElementById('tagSummary').textContent =
      `${list.length} tags · ${groups.size - 1} groups`;
  } catch(e) {
    document.getElementById('tagSummary').textContent = 'Error loading tags';
  }
}

// ── Groups sidebar ─────────────────────────────────────────
function renderGroups() {
  const el = document.getElementById('groupList');
  el.innerHTML = [...groups].sort((a,b) => a === '(all)' ? -1 : b === '(all)' ? 1 : a.localeCompare(b))
    .map(g => {
      const count = g === '(all)'
        ? Object.keys(allTags).length
        : Object.values(allTags).filter(t => t.group === g).length;
      return `<div class="group-item${activeGroup === g || (g==='(all)' && !activeGroup) ? ' active' : ''}"
                   onclick="selectGroup(${JSON.stringify(g)})">
        <span>${g}</span>
        <span class="group-count">${count}</span>
      </div>`;
    }).join('');
}

function selectGroup(g) {
  activeGroup = g === '(all)' ? null : g;
  renderGroups();
  applyFilters();
}

// ── Filters + sort ─────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const type   = document.getElementById('typeFilter').value;

  let list = Object.values(allTags).filter(t => {
    if (activeGroup && t.group !== activeGroup) return false;
    if (type && t.type !== type) return false;
    if (changedOnly && !recentIds.has(t.id)) return false;
    if (search && !t.name.toLowerCase().includes(search) &&
                  !(t.group||'').toLowerCase().includes(search)) return false;
    return true;
  });

  list.sort((a, b) => {
    let av = a[sortKey] ?? '', bv = b[sortKey] ?? '';
    if (av < bv) return -sortDir;
    if (av > bv) return  sortDir;
    return 0;
  });

  document.getElementById('tagCount').textContent =
    list.length + ' tag' + (list.length !== 1 ? 's' : '');

  renderTable(list);
}

function sortBy(key) {
  if (sortKey === key) sortDir = -sortDir;
  else { sortKey = key; sortDir = 1; }
  // Update header classes
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.textContent.toLowerCase().startsWith(key)) {
      th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    }
  });
  applyFilters();
}

function toggleChangedOnly() {
  changedOnly = !changedOnly;
  document.getElementById('changedBtn').classList.toggle('active', changedOnly);
  applyFilters();
}

// ── Table render ───────────────────────────────────────────
function renderTable(list) {
  const body = document.getElementById('tagsBody');
  if (!list.length) {
    body.innerHTML = `<tr><td colspan="6" class="empty">No tags match the current filter</td></tr>`;
    return;
  }
  const now = Date.now();
  body.innerHTML = list.map(t => {
    if (t.id === editingId) return renderEditRow(t);
    return renderViewRow(t, now);
  }).join('');
}

function renderViewRow(t, now) {
  const valHtml = renderValue(t);
  const age = t.ts_us != null ? fmtAge(now - Math.floor(t.ts_us / 1000)) : '—';
  const editBtn = t.read_only ? '' :
    `<button class="btn-edit" onclick="startEdit(${t.id})">✎</button>`;
  const flash = recentIds.has(t.id) ? ' class="flash"' : '';
  return `<tr id="row-${t.id}"${flash}>
    <td class="td-name">${esc(t.name)}</td>
    <td class="td-group">${esc(t.group||'')}</td>
    <td><span class="td-type">${t.type}</span></td>
    <td>${valHtml}</td>
    <td class="td-age">${age}</td>
    <td>${editBtn}</td>
  </tr>`;
}

function renderEditRow(t) {
  const cur = t.type === 'BOOL'
    ? `<button class="bool-toggle${t.value ? ' on' : ''}" onclick="writeTag(${t.id}, ${!t.value})"></button>`
    : `<input class="val-input" id="editInput" value="${esc(String(t.value??''))}"
         onkeydown="if(event.key==='Enter')commitEdit(${t.id});if(event.key==='Escape')cancelEdit()">
       <button class="btn-ok" onclick="commitEdit(${t.id})">✓</button>
       <button class="btn-x"  onclick="cancelEdit()">✕</button>`;
  return `<tr id="row-${t.id}">
    <td class="td-name">${esc(t.name)}</td>
    <td class="td-group">${esc(t.group||'')}</td>
    <td><span class="td-type">${t.type}</span></td>
    <td><div class="val-wrap">${cur}</div></td>
    <td></td><td></td>
  </tr>`;
}

function renderValue(t) {
  if (t.type === 'BOOL') {
    return `<div class="val-wrap">
      <button class="bool-toggle${t.value ? ' on' : ''}" ${t.read_only ? 'disabled' : `onclick="writeTag(${t.id}, ${!t.value})"`}></button>
      <span class="val-text ${t.value ? 'val-true' : 'val-false'}">${t.value ? 'TRUE' : 'FALSE'}</span>
    </div>`;
  }
  const isNum = ['INT','DINT','LINT','SINT','BYTE','WORD','DWORD','LWORD','REAL','LREAL'].includes(t.type);
  const cls = isNum ? 'val-num' : t.type === 'STRING' ? 'val-str' : 'val-text';
  const unit = t.unit ? `<span style="color:#555;font-size:11px;margin-left:4px">${esc(t.unit)}</span>` : '';
  return `<span class="val-text ${cls}">${esc(String(t.value ?? '—'))}</span>${unit}`;
}

// ── Inline edit ────────────────────────────────────────────
function startEdit(id) {
  editingId = id;
  applyFilters();
  // Focus input on next tick
  if (allTags[id].type !== 'BOOL')
    setTimeout(() => document.getElementById('editInput')?.focus(), 20);
}

function cancelEdit() {
  editingId = null;
  applyFilters();
}

async function commitEdit(id) {
  const input = document.getElementById('editInput');
  if (!input) return;
  const raw = input.value.trim();
  await writeTag(id, raw);
}

async function writeTag(id, rawValue) {
  const t = allTags[id];
  if (!t) return;
  let value;
  if (t.type === 'BOOL') value = Boolean(rawValue);
  else if (['INT','DINT','LINT','SINT','BYTE','WORD','DWORD','LWORD'].includes(t.type)) value = parseInt(rawValue, 10);
  else if (['REAL','LREAL'].includes(t.type)) value = parseFloat(rawValue);
  else value = rawValue;

  try {
    const updated = await api('PUT', '/tags/' + id, { value });
    allTags[id] = { ...allTags[id], ...updated };
  } catch(e) {
    console.error('Write failed', e);
  }
  editingId = null;
  applyFilters();
}

// ── WebSocket ───────────────────────────────────────────────
function connectWS() {
  const dot = document.getElementById('wsDot');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    dot.className = 'ws-dot ok';
    ws.send(JSON.stringify({ type: 'subscribe', tags: ['*'] }));
  };
  ws.onclose = () => {
    dot.className = 'ws-dot err';
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = (ev) => {
    try { handleMsg(JSON.parse(ev.data)); } catch(_) {}
  };
}

function handleMsg(msg) {
  const apply = (name, value, ts_us) => {
    const t = Object.values(allTags).find(x => x.name === name);
    if (!t) return;
    t.value = value;
    t.ts_us = ts_us;
    recentIds.add(t.id);
    setTimeout(() => { recentIds.delete(t.id); }, 5000);
    // Update row in-place without full re-render
    updateRow(t);
  };

  if (msg.type === 'tag_update') apply(msg.tag, msg.value, msg.ts_us);
  else if (msg.type === 'tag_batch') (msg.updates||[]).forEach(u => apply(u.tag, u.value, u.ts_us));
}

function updateRow(t) {
  if (t.id === editingId) return;
  const row = document.getElementById('row-' + t.id);
  if (!row) return;
  // Update value cell and flash
  row.children[3].innerHTML = renderValue(t);
  row.children[4].textContent = '< 1s';
  row.classList.add('flash');
  setTimeout(() => row.classList.remove('flash'), 800);
}

// ── Utilities ───────────────────────────────────────────────
function fmtAge(ms) {
  if (ms < 1000) return '< 1s';
  if (ms < 60000) return Math.floor(ms/1000) + 's';
  if (ms < 3600000) return Math.floor(ms/60000) + 'm';
  return Math.floor(ms/3600000) + 'h';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

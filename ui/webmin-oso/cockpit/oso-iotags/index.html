<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSOlogic — I/O Tags</title>
<script src="../base/cockpit.js"></script>
<style>
  :root{--bg:#0e0f12;--panel:#16181d;--panel-2:#1c1f26;--line:#2a2e37;--ink:#ece9e3;--muted:#8b8f99;
    --accent:#f48c06;--brand:#a11313;--good:#46d17f;--bad:#e5484d;--warn:#e6a417;
    --mono:ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;--sans:"Segoe UI",system-ui,sans-serif}
  :root[data-theme="light"]{--bg:#f6f7f9;--panel:#fff;--panel-2:#f1f3f5;--line:#dee2e6;--ink:#1c2024;--muted:#6c757d}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
  a{color:inherit;text-decoration:none}
  .hdr{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--line)}
  .hdr .brand{display:flex;align-items:center;gap:9px}
  .hdr img{width:30px;height:23px}
  .logo{font-weight:800;font-size:18px}.logo b{color:var(--accent)}
  .krumb{margin-left:18px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .krumb a{color:var(--muted)}.krumb a:hover{color:var(--accent)}
  .toggle{width:32px;height:32px;border:1px solid var(--line);background:var(--panel);border-radius:8px;color:var(--ink);cursor:pointer}
  .ws-dot{width:9px;height:9px;border-radius:50%;background:var(--muted);margin-left:auto;flex:none}
  .ws-dot.ok{background:var(--good);box-shadow:0 0 0 3px color-mix(in srgb,var(--good) 22%,transparent)}
  .ws-dot.err{background:var(--bad)}
  .titlebar{padding:18px 24px 0}
  .titlebar h1{font-size:23px;margin:0;letter-spacing:-.02em}.titlebar h1 em{font-style:normal;color:var(--accent)}
  .titlebar .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .layout{display:grid;grid-template-columns:210px 1fr;gap:18px;padding:18px 24px 40px;align-items:start}
  .sidebar{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:10px}
  .sidebar-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:4px 8px 8px;font-weight:700}
  .group-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--ink)}
  .group-item:hover{background:var(--panel-2)}
  .group-item.active{background:color-mix(in srgb,var(--accent) 15%,var(--panel));color:var(--accent)}
  .group-count{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .group-item.active .group-count{color:var(--accent)}
  .main{min-width:0}
  .toolbar{display:flex;align-items:center;gap:9px;margin-bottom:14px;flex-wrap:wrap}
  #searchInput,.type-filter{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 11px;font:13px var(--sans)}
  #searchInput{flex:1;min-width:180px}
  #searchInput:focus,.type-filter:focus{outline:none;border-color:var(--accent)}
  .toggle-btn{background:var(--panel);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:8px 13px;cursor:pointer;font-size:12.5px}
  .toggle-btn.active{border-color:var(--accent);color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--panel))}
  .toolbar-right{margin-left:auto}
  .tag-count{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;background:var(--panel)}
  thead th[onclick]{cursor:pointer}thead th[onclick]:hover{color:var(--accent)}
  tbody td{padding:9px 14px;border-bottom:1px solid var(--line)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--panel-2)}
  .td-name{font-weight:600}
  .td-group,.td-type,.td-age{font-family:var(--mono);font-size:12px;color:var(--muted)}
  .td-type{color:var(--accent)}
  .val-wrap{display:flex;align-items:center;gap:8px}
  .val-text{font-family:var(--mono);font-weight:600}
  .val-true{color:var(--good)}.val-false{color:var(--muted)}
  .val-input{background:var(--panel-2);border:1px solid var(--accent);color:var(--ink);border-radius:6px;padding:4px 8px;font:12.5px var(--mono);width:120px}
  .bool-toggle{width:34px;height:19px;border-radius:999px;background:var(--panel-2);border:1px solid var(--line);position:relative;cursor:pointer;flex:none}
  .bool-toggle::after{content:"";position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:var(--muted);transition:.15s}
  .bool-toggle.on{background:color-mix(in srgb,var(--good) 30%,var(--panel-2));border-color:var(--good)}.bool-toggle.on::after{left:17px;background:var(--good)}
  .bool-toggle:disabled{opacity:.5;cursor:default}
  .btn-edit,.btn-ok,.btn-x{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:6px;padding:3px 9px;cursor:pointer;font-size:12px}
  .btn-edit:hover{border-color:var(--accent);color:var(--accent)}
  .btn-ok:hover{border-color:var(--good);color:var(--good)}
  .btn-x:hover{border-color:var(--bad);color:var(--bad)}
  .empty{text-align:center;color:var(--muted);padding:26px}
  @keyframes flash{from{background:color-mix(in srgb,var(--accent) 25%,transparent)}to{background:transparent}}
  .flash{animation:flash 1s ease-out}
  .related{border-top:1px solid var(--line);margin:0 24px;padding:14px 0 40px;font-size:12.5px;color:var(--muted)}
  .related a{color:var(--accent);margin:0 4px}
</style>
</head>
<body>
<header class="hdr">
  <a href="../../index.html" class="brand"><img src="../../../shared/oso-mark.svg" alt="OSOLogic" onerror="this.style.display='none'"><span class="logo">OSO<b>logic</b></span></a>
  <span class="krumb"><a href="/">Home</a> › <a href="../../index.html">Admin</a> › I/O Tags</span>
  <div class="ws-dot" id="wsDot" title="Live updates"></div>
  <button class="toggle" id="themeBtn" title="Theme">◐</button>
</header>
<div class="titlebar"><h1>I/O Tags <em>· osodb browser</em></h1><div class="sub" id="tagSummary">Loading…</div></div>
<script>(function(){var r=document.documentElement,t=localStorage.getItem('oso-theme');if(t)r.setAttribute('data-theme',t);document.addEventListener('click',function(e){if(e.target&&e.target.id==='themeBtn'){var n=r.getAttribute('data-theme')==='light'?'dark':'light';r.setAttribute('data-theme',n);localStorage.setItem('oso-theme',n);}});})();</script>
  <div class="ws-dot" id="wsDot" title="Live updates"></div>
</div>

<div class="layout">

  <!-- Group sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">Groups</div>
    <div id="groupList"></div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Toolbar -->
    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="Search tags…" oninput="applyFilters()">
      <select class="type-filter" id="typeFilter" onchange="applyFilters()">
        <option value="">All types</option>
        <option>BOOL</option>
        <option>INT</option>
        <option>DINT</option>
        <option>LINT</option>
        <option>REAL</option>
        <option>LREAL</option>
        <option>WORD</option>
        <option>DWORD</option>
        <option>STRING</option>
        <option>TIME</option>
      </select>
      <button class="toggle-btn" id="changedBtn" onclick="toggleChangedOnly()">Changed only</button>
      <div class="toolbar-right">
        <span class="tag-count" id="tagCount">0 tags</span>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('name')">Name</th>
            <th>Group</th>
            <th onclick="sortBy('type')">Type</th>
            <th>Value</th>
            <th onclick="sortBy('ts_us')">Updated</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tagsBody">
          <tr><td colspan="6" class="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script>
const BASE = '/api/v1';
const WS_URL = `ws://${location.host}/ws`;

// ── State ──────────────────────────────────────────────────
let allTags     = {};       // id → tag
let groups      = new Set();
let activeGroup = null;     // null = all
let sortKey     = 'name';
let sortDir     = 1;        // 1 asc, -1 desc
let changedOnly = false;
let recentIds   = new Set(); // tags updated in last 5s
let editingId   = null;
let ws          = null;

// ── Boot ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  fetchTags();
  connectWS();
});

// ── REST ───────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function fetchTags() {
  try {
    const list = await api('GET', '/tags');
    allTags = {};
    groups = new Set(['(all)']);
    list.forEach(t => {
      allTags[t.id] = t;
      if (t.group) groups.add(t.group);
    });
    renderGroups();
    applyFilters();
    document.getElementById('tagSummary').textContent =
      `${list.length} tags · ${groups.size - 1} groups`;
  } catch(e) {
    document.getElementById('tagSummary').textContent = 'Error loading tags';
  }
}

// ── Groups sidebar ─────────────────────────────────────────
function renderGroups() {
  const el = document.getElementById('groupList');
  el.innerHTML = [...groups].sort((a,b) => a === '(all)' ? -1 : b === '(all)' ? 1 : a.localeCompare(b))
    .map(g => {
      const count = g === '(all)'
        ? Object.keys(allTags).length
        : Object.values(allTags).filter(t => t.group === g).length;
      return `<div class="group-item${activeGroup === g || (g==='(all)' && !activeGroup) ? ' active' : ''}"
                   onclick="selectGroup(${JSON.stringify(g)})">
        <span>${g}</span>
        <span class="group-count">${count}</span>
      </div>`;
    }).join('');
}

function selectGroup(g) {
  activeGroup = g === '(all)' ? null : g;
  renderGroups();
  applyFilters();
}

// ── Filters + sort ─────────────────────────────────────────
function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const type   = document.getElementById('typeFilter').value;

  let list = Object.values(allTags).filter(t => {
    if (activeGroup && t.group !== activeGroup) return false;
    if (type && t.type !== type) return false;
    if (changedOnly && !recentIds.has(t.id)) return false;
    if (search && !t.name.toLowerCase().includes(search) &&
                  !(t.group||'').toLowerCase().includes(search)) return false;
    return true;
  });

  list.sort((a, b) => {
    let av = a[sortKey] ?? '', bv = b[sortKey] ?? '';
    if (av < bv) return -sortDir;
    if (av > bv) return  sortDir;
    return 0;
  });

  document.getElementById('tagCount').textContent =
    list.length + ' tag' + (list.length !== 1 ? 's' : '');

  renderTable(list);
}

function sortBy(key) {
  if (sortKey === key) sortDir = -sortDir;
  else { sortKey = key; sortDir = 1; }
  // Update header classes
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.textContent.toLowerCase().startsWith(key)) {
      th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    }
  });
  applyFilters();
}

function toggleChangedOnly() {
  changedOnly = !changedOnly;
  document.getElementById('changedBtn').classList.toggle('active', changedOnly);
  applyFilters();
}

// ── Table render ───────────────────────────────────────────
function renderTable(list) {
  const body = document.getElementById('tagsBody');
  if (!list.length) {
    body.innerHTML = `<tr><td colspan="6" class="empty">No tags match the current filter</td></tr>`;
    return;
  }
  const now = Date.now();
  body.innerHTML = list.map(t => {
    if (t.id === editingId) return renderEditRow(t);
    return renderViewRow(t, now);
  }).join('');
}

function renderViewRow(t, now) {
  const valHtml = renderValue(t);
  const age = t.ts_us != null ? fmtAge(now - Math.floor(t.ts_us / 1000)) : '—';
  const editBtn = t.read_only ? '' :
    `<button class="btn-edit" onclick="startEdit(${t.id})">✎</button>`;
  const flash = recentIds.has(t.id) ? ' class="flash"' : '';
  return `<tr id="row-${t.id}"${flash}>
    <td class="td-name">${esc(t.name)}</td>
    <td class="td-group">${esc(t.group||'')}</td>
    <td><span class="td-type">${t.type}</span></td>
    <td>${valHtml}</td>
    <td class="td-age">${age}</td>
    <td>${editBtn}</td>
  </tr>`;
}

function renderEditRow(t) {
  const cur = t.type === 'BOOL'
    ? `<button class="bool-toggle${t.value ? ' on' : ''}" onclick="writeTag(${t.id}, ${!t.value})"></button>`
    : `<input class="val-input" id="editInput" value="${esc(String(t.value??''))}"
         onkeydown="if(event.key==='Enter')commitEdit(${t.id});if(event.key==='Escape')cancelEdit()">
       <button class="btn-ok" onclick="commitEdit(${t.id})">✓</button>
       <button class="btn-x"  onclick="cancelEdit()">✕</button>`;
  return `<tr id="row-${t.id}">
    <td class="td-name">${esc(t.name)}</td>
    <td class="td-group">${esc(t.group||'')}</td>
    <td><span class="td-type">${t.type}</span></td>
    <td><div class="val-wrap">${cur}</div></td>
    <td></td><td></td>
  </tr>`;
}

function renderValue(t) {
  if (t.type === 'BOOL') {
    return `<div class="val-wrap">
      <button class="bool-toggle${t.value ? ' on' : ''}" ${t.read_only ? 'disabled' : `onclick="writeTag(${t.id}, ${!t.value})"`}></button>
      <span class="val-text ${t.value ? 'val-true' : 'val-false'}">${t.value ? 'TRUE' : 'FALSE'}</span>
    </div>`;
  }
  const isNum = ['INT','DINT','LINT','SINT','BYTE','WORD','DWORD','LWORD','REAL','LREAL'].includes(t.type);
  const cls = isNum ? 'val-num' : t.type === 'STRING' ? 'val-str' : 'val-text';
  const unit = t.unit ? `<span style="color:#555;font-size:11px;margin-left:4px">${esc(t.unit)}</span>` : '';
  return `<span class="val-text ${cls}">${esc(String(t.value ?? '—'))}</span>${unit}`;
}

// ── Inline edit ────────────────────────────────────────────
function startEdit(id) {
  editingId = id;
  applyFilters();
  // Focus input on next tick
  if (allTags[id].type !== 'BOOL')
    setTimeout(() => document.getElementById('editInput')?.focus(), 20);
}

function cancelEdit() {
  editingId = null;
  applyFilters();
}

async function commitEdit(id) {
  const input = document.getElementById('editInput');
  if (!input) return;
  const raw = input.value.trim();
  await writeTag(id, raw);
}

async function writeTag(id, rawValue) {
  const t = allTags[id];
  if (!t) return;
  let value;
  if (t.type === 'BOOL') value = Boolean(rawValue);
  else if (['INT','DINT','LINT','SINT','BYTE','WORD','DWORD','LWORD'].includes(t.type)) value = parseInt(rawValue, 10);
  else if (['REAL','LREAL'].includes(t.type)) value = parseFloat(rawValue);
  else value = rawValue;

  try {
    const updated = await api('PUT', '/tags/' + id, { value });
    allTags[id] = { ...allTags[id], ...updated };
  } catch(e) {
    console.error('Write failed', e);
  }
  editingId = null;
  applyFilters();
}

// ── WebSocket ───────────────────────────────────────────────
function connectWS() {
  const dot = document.getElementById('wsDot');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    dot.className = 'ws-dot ok';
    ws.send(JSON.stringify({ type: 'subscribe', tags: ['*'] }));
  };
  ws.onclose = () => {
    dot.className = 'ws-dot err';
    setTimeout(connectWS, 3000);
  };
  ws.onmessage = (ev) => {
    try { handleMsg(JSON.parse(ev.data)); } catch(_) {}
  };
}

function handleMsg(msg) {
  const apply = (name, value, ts_us) => {
    const t = Object.values(allTags).find(x => x.name === name);
    if (!t) return;
    t.value = value;
    t.ts_us = ts_us;
    recentIds.add(t.id);
    setTimeout(() => { recentIds.delete(t.id); }, 5000);
    // Update row in-place without full re-render
    updateRow(t);
  };

  if (msg.type === 'tag_update') apply(msg.tag, msg.value, msg.ts_us);
  else if (msg.type === 'tag_batch') (msg.updates||[]).forEach(u => apply(u.tag, u.value, u.ts_us));
}

function updateRow(t) {
  if (t.id === editingId) return;
  const row = document.getElementById('row-' + t.id);
  if (!row) return;
  // Update value cell and flash
  row.children[3].innerHTML = renderValue(t);
  row.children[4].textContent = '< 1s';
  row.classList.add('flash');
  setTimeout(() => row.classList.remove('flash'), 800);
}

// ── Utilities ───────────────────────────────────────────────
function fmtAge(ms) {
  if (ms < 1000) return '< 1s';
  if (ms < 60000) return Math.floor(ms/1000) + 's';
  if (ms < 3600000) return Math.floor(ms/60000) + 'm';
  return Math.floor(ms/3600000) + 'h';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>

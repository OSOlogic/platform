<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSOlogic — Gateways</title>
<script src="../base/cockpit.js"></script>
<style>
  :root{--bg:#0e0f12;--panel:#16181d;--panel-2:#1c1f26;--line:#2a2e37;--ink:#ece9e3;--muted:#8b8f99;
    --accent:#3d8bfd;--brand:#a11313;--good:#46d17f;--bad:#e5484d;--warn:#e6a417;
    --mono:ui-monospace,Menlo,Consolas,monospace;--sans:"Segoe UI",system-ui,sans-serif}
  :root[data-theme="light"]{--bg:#f6f7f9;--panel:#fff;--panel-2:#f1f3f5;--line:#dee2e6;--ink:#1c2024;--muted:#6c757d}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
  a{color:inherit;text-decoration:none}
  .hdr{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--line)}
  .hdr .brand{display:flex;align-items:center;gap:9px}.hdr img{width:30px;height:23px}
  .logo{font-weight:800;font-size:18px}.logo b{color:var(--accent)}
  .krumb{margin-left:18px;font-family:var(--mono);font-size:12px;color:var(--muted)}.krumb a{color:var(--muted)}.krumb a:hover{color:var(--accent)}
  .toggle{width:32px;height:32px;border:1px solid var(--line);background:var(--panel);border-radius:8px;color:var(--ink);cursor:pointer;margin-left:auto}
  .titlebar{padding:18px 24px 0}.titlebar h1{font-size:23px;margin:0}.titlebar h1 em{font-style:normal;color:var(--accent)}
  .titlebar .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .toolbar{display:flex;align-items:center;gap:9px;padding:16px 24px 0;flex-wrap:wrap}
  .cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;padding:16px 24px 40px}
  .gw-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .gw-card-header{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .gw-id{font-weight:700}.gw-footer{padding:11px 16px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center}
  .proto-badge{font-family:var(--mono);font-size:11px;background:var(--panel-2);border:1px solid var(--line);border-radius:6px;padding:2px 8px;color:var(--accent)}
  .state-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);flex:none}
  .state-dot.ok{background:var(--good);box-shadow:0 0 0 3px color-mix(in srgb,var(--good) 20%,transparent)}
  .state-dot.err{background:var(--bad)}
  .gw-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}
  .gw-stat{background:var(--panel);padding:11px 16px}.gw-stat .sl{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .gw-stat .sv{font-family:var(--mono);font-weight:700;margin-top:2px}
  .gw-error{color:var(--bad);font-family:var(--mono);font-size:12px;padding:0 16px 12px}
  .last-ok{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
  .empty-state{text-align:center;color:var(--muted);padding:34px;background:var(--panel);border:1px solid var(--line);border-radius:12px;grid-column:1/-1}
  input,select{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 11px;font:13px var(--sans)}
  input:focus,select:focus{outline:none;border-color:var(--accent)}
  .btn-primary,.btn-save{background:var(--accent);border:1px solid var(--accent);color:#fff;font-weight:600;border-radius:8px;padding:8px 15px;cursor:pointer;font-size:13px}.btn-primary:hover,.btn-save:hover{filter:brightness(1.08)}
  .btn-secondary,.btn-cancel-cfg{background:var(--panel-2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px}
  .btn-icon{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 10px;cursor:pointer}.btn-icon:hover{border-color:var(--accent);color:var(--accent)}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);align-items:center;justify-content:center;z-index:50}.modal-bg.open,.modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px 22px;max-width:520px;width:92%}
  .cfg-title{font-size:15px;font-weight:700;margin:0 0 14px}
  .cfg-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.cfg-field{display:flex;flex-direction:column;gap:5px}
  .cfg-field label{font-size:12px;color:var(--muted)}
  .cfg-actions,.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
</style>
</head>
<body>
<!-- Header -->
<header class="hdr">
  <a href="../../index.html" class="brand"><img src="../../../shared/oso-mark.svg" alt="OSOLogic" onerror="this.style.display='none'"><span class="logo">OSO<b>logic</b></span></a>
  <span class="krumb"><a href="/">Home</a> › <a href="../../index.html">Admin</a> › Gateways</span>
  <button class="toggle" id="themeBtn" title="Theme">◐</button>
</header>
<div class="titlebar"><h1>Gateways <em>· Modbus · OPC-UA · MQTT · HA</em></h1><div class="sub" id="gwSummary">Loading…</div></div>
<script>(function(){var r=document.documentElement,t=localStorage.getItem('oso-theme');if(t)r.setAttribute('data-theme',t);document.addEventListener('click',function(e){if(e.target&&e.target.id==='themeBtn'){var n=r.getAttribute('data-theme')==='light'?'dark':'light';r.setAttribute('data-theme',n);localStorage.setItem('oso-theme',n);}});})();</script>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <h2>Configured gateways</h2>
  <button class="btn-secondary" onclick="fetchAll()">↺ Refresh</button>
  <button class="btn-primary" onclick="openAddModal()">+ Add gateway</button>
</div>

<!-- Cards -->
<div class="cards-grid" id="cardsGrid">
  <div style="grid-column:1/-1;text-align:center;padding:40px;color:#aaa">Loading…</div>
</div>

<!-- Add gateway modal -->
<div class="modal-bg" id="addModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Add gateway</h3>
    <div class="cfg-grid">
      <div class="cfg-field full">
        <label>Gateway ID</label>
        <input type="text" id="newId" placeholder="e.g. modbus-1">
      </div>
      <div class="cfg-field full">
        <label>Protocol</label>
        <select id="newProto" onchange="renderNewFields()">
          <option value="modbus-tcp">Modbus TCP — Client / Master</option>
          <option value="modbus-tcp-server">Modbus TCP — Server / Slave</option>
          <option value="modbus-rtu">Modbus RTU — Client / Master</option>
          <option value="modbus-rtu-server">Modbus RTU — Server / Slave</option>
          <option value="opc-ua">OPC-UA Client</option>
          <option value="opc-ua-server">OPC-UA Server</option>
          <option value="mqtt">MQTT Client</option>
          <option value="mqtt-broker">MQTT Broker</option>
          <option value="profinet">PROFINET</option>
          <option value="ethernetip">EtherNet/IP</option>
          <option value="canopen">CANopen</option>
        </select>
      </div>
      <div id="newFields" class="cfg-field full" style="display:contents"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel-cfg" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addGateway()">Add</button>
    </div>
  </div>
</div>

<script>
const BASE = '/api/v1';
const POLL_MS = 5000;

let gateways = [];
let openConfigs = new Set();  // gateway ids with config panel open
let pollTimer = null;

// ── Boot ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  fetchAll();
  pollTimer = setInterval(fetchAll, POLL_MS);
  renderNewFields();
});

// ── REST ───────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

async function fetchAll() {
  try {
    gateways = await api('GET', '/gateways');
    renderCards();
    const connected = gateways.filter(g => g.state === 'connected').length;
    const errors    = gateways.filter(g => g.state === 'error').length;
    document.getElementById('gwSummary').textContent =
      `${gateways.length} gateways · ${connected} connected` +
      (errors ? ` · ${errors} error${errors > 1 ? 's' : ''}` : '');
  } catch(e) {
    document.getElementById('gwSummary').textContent = 'Error: ' + e.message;
  }
}

async function restartGateway(id) {
  try {
    await api('POST', `/gateways/${id}/restart`);
    fetchAll();
  } catch(e) { alert('Restart failed: ' + e.message) }
}

async function saveConfig(id) {
  const cfg = readFormConfig(id);
  try {
    await api('PUT', `/gateways/${id}`, cfg);
    openConfigs.delete(id);
    fetchAll();
  } catch(e) { alert('Save failed: ' + e.message) }
}

async function addGateway() {
  const id    = document.getElementById('newId').value.trim();
  const proto = document.getElementById('newProto').value;
  if (!id) { alert('Gateway ID is required'); return; }
  const cfg = readNewFormConfig();
  try {
    await api('PUT', `/gateways/${id}`, { protocol: proto, config: cfg });
    closeModal();
    fetchAll();
  } catch(e) { alert('Add failed: ' + e.message) }
}

// ── Render ─────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  if (!gateways.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">⚡</div>
        <p>No gateways configured yet.</p>
        <button class="btn-primary" onclick="openAddModal()">+ Add first gateway</button>
      </div>`;
    return;
  }
  grid.innerHTML = gateways.map(g => renderCard(g)).join('');
}

function renderCard(g) {
  const st  = g.state || 'disconnected';
  const cfg = g.config || {};
  const stats = g.stats || {};
  const isOpen = openConfigs.has(g.id);

  const errorHtml = (st === 'error' && g.error_msg)
    ? `<div class="gw-error" style="display:block">${esc(g.error_msg)}</div>` : '';

  const lastOk = stats.last_ok_ts
    ? `Last OK: ${fmtAge(Date.now() - stats.last_ok_ts)}` : '';

  return `
  <div class="gw-card state-${st}" id="card-${esc(g.id)}">
    <div class="gw-card-header">
      <span class="proto-badge proto-${g.protocol}">${protoLabel(g.protocol)}</span>
      <span class="gw-id">${esc(g.id)}</span>
      <span class="state-dot dot-${st}" title="${st}"></span>
    </div>
    <div style="padding:0 16px 6px;font-size:12px;color:#777">${cfgSummary(g.protocol, cfg)}</div>
    ${errorHtml}
    <div class="gw-stats">
      <div class="gw-stat">
        <div class="sv">${fmtNum(stats.tx_count ?? 0)}</div>
        <div class="sl">TX</div>
      </div>
      <div class="gw-stat">
        <div class="sv">${fmtNum(stats.rx_count ?? 0)}</div>
        <div class="sl">RX</div>
      </div>
      <div class="gw-stat ${(stats.error_count||0) > 0 ? 'err' : ''}">
        <div class="sv">${fmtNum(stats.error_count ?? 0)}</div>
        <div class="sl">Errors</div>
      </div>
    </div>
    <div class="gw-footer">
      <button class="btn-icon" onclick="toggleConfig('${esc(g.id)}')">
        ${isOpen ? '▲ Hide config' : '▼ Config'}
      </button>
      <button class="btn-icon" onclick="restartGateway('${esc(g.id)}')">↺ Restart</button>
      <span class="last-ok">${lastOk}</span>
    </div>
    <div class="gw-config${isOpen ? ' open' : ''}" id="cfg-${esc(g.id)}">
      <div class="cfg-title">Configuration — ${protoLabel(g.protocol)}</div>
      <div class="cfg-grid">${cfgFields(g.id, g.protocol, cfg)}</div>
      <div class="cfg-actions">
        <button class="btn-cancel-cfg" onclick="toggleConfig('${esc(g.id)}')">Cancel</button>
        <button class="btn-save" onclick="saveConfig('${esc(g.id)}')">Save & apply</button>
      </div>
    </div>
  </div>`;
}

function toggleConfig(id) {
  if (openConfigs.has(id)) openConfigs.delete(id);
  else openConfigs.add(id);
  renderCards();
}

// ── Protocol-specific config forms ─────────────────────────
const PROTO_FIELDS = {
  'modbus-tcp': [
    { id:'host',     label:'Host / IP',   type:'text',   placeholder:'192.168.1.100' },
    { id:'port',     label:'Port',         type:'number', placeholder:'502', half:true },
    { id:'slave_id', label:'Slave ID',     type:'number', placeholder:'1',   half:true },
    { id:'poll_ms',  label:'Poll (ms)',    type:'number', placeholder:'100', half:true },
  ],
  'modbus-rtu': [
    { id:'serial_port', label:'Serial port', type:'text',   placeholder:'/dev/ttyUSB0', full:true },
    { id:'baud_rate',   label:'Baud rate',   type:'number', placeholder:'9600',  half:true },
    { id:'slave_id',    label:'Slave ID',    type:'number', placeholder:'1',     half:true },
    { id:'poll_ms',     label:'Poll (ms)',   type:'number', placeholder:'100',   half:true },
    { id:'parity',      label:'Parity',      type:'select', options:['none','even','odd'], half:true },
  ],
  'modbus-tcp-server': [
    { id:'bind_address', label:'Bind address', type:'text',   placeholder:'0.0.0.0', half:true },
    { id:'port',         label:'Port',         type:'number', placeholder:'502', half:true },
    { id:'unit_id',      label:'Unit ID',      type:'number', placeholder:'1', half:true },
    { id:'expose_tags',  label:'Expose tags (glob → registers)', type:'text', placeholder:'*  ·  2.*,hass.*', full:true },
  ],
  'modbus-rtu-server': [
    { id:'serial_port', label:'Serial port', type:'text',   placeholder:'/dev/ttyUSB0', full:true },
    { id:'baud_rate',   label:'Baud rate',   type:'number', placeholder:'9600', half:true },
    { id:'unit_id',     label:'Unit ID',     type:'number', placeholder:'1', half:true },
    { id:'parity',      label:'Parity',      type:'select', options:['none','even','odd'], half:true },
    { id:'expose_tags', label:'Expose tags (glob → registers)', type:'text', placeholder:'*', full:true },
  ],
  'opc-ua': [
    { id:'endpoint_url', label:'Endpoint URL', type:'text', placeholder:'opc.tcp://192.168.1.200:4840', full:true },
    { id:'security',     label:'Security',     type:'select', options:['None','Basic128Rsa15','Basic256Sha256'], full:true },
    { id:'poll_ms',      label:'Poll (ms)',    type:'number', placeholder:'500', half:true },
  ],
  'opc-ua-server': [
    { id:'bind_address',   label:'Bind address', type:'text',   placeholder:'0.0.0.0', half:true },
    { id:'port',           label:'Port',         type:'number', placeholder:'4840', half:true },
    { id:'namespace_uri',  label:'Namespace URI',type:'text',   placeholder:'urn:osologic:platform', full:true },
    { id:'security_policy',label:'Security policy', type:'select', options:['None','Basic128Rsa15','Basic256Sha256'], half:true },
    { id:'auth',           label:'Authentication',  type:'select', options:['Anonymous','Username-Password','Certificate'], half:true },
    { id:'username',       label:'Username (if user/pass)', type:'text', placeholder:'opcuser', half:true },
    { id:'expose_tags',    label:'Expose tags (glob)', type:'text', placeholder:'*  ·  or  2.*,hass.*', full:true },
  ],
  'mqtt': [
    { id:'host',         label:'Broker host', type:'text',   placeholder:'192.168.1.10' },
    { id:'port',         label:'Port',        type:'number', placeholder:'1883', half:true },
    { id:'topic_prefix', label:'Topic prefix',type:'text',   placeholder:'osologic/', full:true },
    { id:'qos',          label:'QoS',         type:'select', options:['0','1','2'], half:true },
    { id:'poll_ms',      label:'Publish (ms)',type:'number', placeholder:'100', half:true },
  ],
  'mqtt-broker': [
    { id:'bind_address', label:'Bind address', type:'text',   placeholder:'0.0.0.0', half:true },
    { id:'port',         label:'TCP port',     type:'number', placeholder:'1883', half:true },
    { id:'ws_port',      label:'WebSocket port', type:'number', placeholder:'9001', half:true },
    { id:'auth',         label:'Authentication', type:'select', options:['Anonymous','Username-Password'], half:true },
    { id:'topic_prefix', label:'Topic prefix', type:'text',   placeholder:'osologic/', full:true },
    { id:'retain',       label:'Retain', type:'select', options:['yes','no'], half:true },
  ],
  'profinet': [
    { id:'interface',     label:'Network interface', type:'text', placeholder:'eth0', half:true },
    { id:'station_name',  label:'Station name',      type:'text', placeholder:'oso-plc-1', half:true },
    { id:'update_rate_ms',label:'Update rate (ms)',  type:'number', placeholder:'4', half:true },
  ],
  'ethernetip': [
    { id:'host',     label:'PLC host / IP', type:'text',   placeholder:'192.168.1.50' },
    { id:'slot',     label:'Slot',          type:'number', placeholder:'0',   half:true },
    { id:'poll_ms',  label:'Poll (ms)',     type:'number', placeholder:'100', half:true },
  ],
  'canopen': [
    { id:'interface', label:'CAN interface', type:'text',   placeholder:'can0', half:true },
    { id:'node_id',   label:'Node ID',       type:'number', placeholder:'1',    half:true },
    { id:'bitrate',   label:'Bitrate (kbps)',type:'select', options:['125','250','500','1000'], half:true },
  ],
};

function cfgFields(gwId, proto, current) {
  const fields = PROTO_FIELDS[proto] || [];
  return fields.map(f => {
    const val = current[f.id] ?? '';
    const cls = f.full ? 'cfg-field full' : 'cfg-field';
    const inputId = `cfg_${gwId}_${f.id}`;
    if (f.type === 'select') {
      const opts = f.options.map(o =>
        `<option${String(val) === o ? ' selected' : ''}>${o}</option>`).join('');
      return `<div class="${cls}"><label>${f.label}</label>
        <select id="${inputId}">${opts}</select></div>`;
    }
    return `<div class="${cls}"><label>${f.label}</label>
      <input type="${f.type}" id="${inputId}" value="${esc(String(val))}" placeholder="${f.placeholder||''}"></div>`;
  }).join('');
}

function readFormConfig(gwId) {
  const gw = gateways.find(g => g.id === gwId);
  if (!gw) return {};
  const fields = PROTO_FIELDS[gw.protocol] || [];
  const cfg = {};
  fields.forEach(f => {
    const el = document.getElementById(`cfg_${gwId}_${f.id}`);
    if (el) cfg[f.id] = f.type === 'number' ? Number(el.value) : el.value;
  });
  return { config: cfg };
}

function renderNewFields() {
  const proto = document.getElementById('newProto').value;
  const fields = PROTO_FIELDS[proto] || [];
  const cont = document.getElementById('newFields');
  cont.innerHTML = fields.map(f => {
    const cls = f.full ? 'cfg-field full' : 'cfg-field';
    if (f.type === 'select') {
      const opts = f.options.map(o => `<option>${o}</option>`).join('');
      return `<div class="${cls}"><label>${f.label}</label>
        <select id="new_${f.id}">${opts}</select></div>`;
    }
    return `<div class="${cls}"><label>${f.label}</label>
      <input type="${f.type}" id="new_${f.id}" placeholder="${f.placeholder||''}"></div>`;
  }).join('');
}

function readNewFormConfig() {
  const proto = document.getElementById('newProto').value;
  const fields = PROTO_FIELDS[proto] || [];
  const cfg = {};
  fields.forEach(f => {
    const el = document.getElementById(`new_${f.id}`);
    if (el) cfg[f.id] = f.type === 'number' ? Number(el.value) : el.value;
  });
  return cfg;
}

// ── Modal ──────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('newId').value = '';
  renderNewFields();
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('newId').focus(), 50);
}
function closeModal() {
  document.getElementById('addModal').classList.remove('open');
}

// ── Utils ──────────────────────────────────────────────────
const PROTO_LABELS = {
  'modbus-tcp': 'Modbus TCP · Master', 'modbus-tcp-server': 'Modbus TCP · Server',
  'modbus-rtu': 'Modbus RTU · Master', 'modbus-rtu-server': 'Modbus RTU · Server',
  'opc-ua': 'OPC-UA Client', 'opc-ua-server': 'OPC-UA Server',
  'mqtt': 'MQTT Client', 'mqtt-broker': 'MQTT Broker', 'profinet': 'PROFINET',
  'ethernetip': 'EtherNet/IP', 'canopen': 'CANopen',
};
function protoLabel(p) { return PROTO_LABELS[p] || p }

function cfgSummary(proto, cfg) {
  if (proto === 'modbus-tcp')  return `${cfg.host||'—'}:${cfg.port||502}  slave ${cfg.slave_id||1}`;
  if (proto === 'modbus-rtu')  return `${cfg.serial_port||'—'}  ${cfg.baud_rate||9600} baud`;
  if (proto === 'modbus-tcp-server') return `serve ${cfg.bind_address||'0.0.0.0'}:${cfg.port||502}  unit ${cfg.unit_id||1}  · ${cfg.expose_tags||'*'}`;
  if (proto === 'modbus-rtu-server') return `serve ${cfg.serial_port||'—'}  ${cfg.baud_rate||9600} baud  unit ${cfg.unit_id||1}`;
  if (proto === 'opc-ua')      return cfg.endpoint_url || '—';
  if (proto === 'opc-ua-server') return `serve :${cfg.port||4840}  ${cfg.namespace_uri||'urn:osologic:platform'}  · ${cfg.auth||'Anonymous'}`;
  if (proto === 'mqtt')        return `${cfg.host||'—'}:${cfg.port||1883}  ${cfg.topic_prefix||''}`;
  if (proto === 'mqtt-broker') return `broker :${cfg.port||1883}${cfg.ws_port?(' · ws :'+cfg.ws_port):''}  ${cfg.topic_prefix||''}`;
  if (proto === 'profinet')    return `${cfg.interface||'eth0'}  ${cfg.station_name||'—'}`;
  if (proto === 'ethernetip')  return `${cfg.host||'—'}  slot ${cfg.slot??0}`;
  if (proto === 'canopen')     return `${cfg.interface||'can0'}  node ${cfg.node_id||1}  ${cfg.bitrate||250}k`;
  return '';
}

function fmtNum(n) {
  return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'k' : String(n);
}
function fmtAge(ms) {
  if (ms < 1000)    return '< 1s';
  if (ms < 60000)   return Math.floor(ms/1000) + 's ago';
  if (ms < 3600000) return Math.floor(ms/60000) + 'm ago';
  return Math.floor(ms/3600000) + 'h ago';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSOlogic — Gateways</title>
<script src="../base/cockpit.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@patternfly/patternfly@5/patternfly.min.css" crossorigin>
<style>
  :root {
    --oso-red:  #800000;
    --oso-red2: #a00000;
    --oso-red3: #600000;
    --bg:       #111;
    --bg2:      #1a1a1a;
    --bg3:      #222;
    --border:   #2a2a2a;
    --text:     #e0e0e0;
    --muted:    #666;
  }

  body { background: #f0f0f0 }   /* PF light base */

  /* ── Header ─────────────────────────────────────────────── */
  .oso-header {
    background: #1c1c1c;
    border-bottom: 3px solid var(--oso-red3);
    padding: 10px 24px;
    display: flex; align-items: center; gap: 14px;
  }
  .oso-header h1 { font-size:17px; font-weight:700; color:#e0e0e0; margin:0 }
  .oso-header .sub { font-size:11px; color:#666; margin-top:2px }

  /* ── Toolbar ─────────────────────────────────────────────── */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 24px;
    background: #fff;
    border-bottom: 1px solid #ddd;
    flex-wrap: wrap;
  }
  .toolbar h2 { font-size:15px; font-weight:600; margin:0; flex:1 }
  .btn-primary {
    background: var(--oso-red); color:#fff; border:none;
    border-radius:4px; padding:7px 16px; font-size:13px; cursor:pointer;
  }
  .btn-primary:hover { background: var(--oso-red2) }
  .btn-secondary {
    background:#fff; color:#333; border:1px solid #ccc;
    border-radius:4px; padding:7px 14px; font-size:13px; cursor:pointer;
  }
  .btn-secondary:hover { background:#f5f5f5 }
  .btn-danger {
    background:#fff; color:#c00; border:1px solid #fca5a5;
    border-radius:4px; padding:5px 12px; font-size:12px; cursor:pointer;
  }
  .btn-danger:hover { background:#fff5f5 }
  .btn-icon {
    background:transparent; border:1px solid #ddd; border-radius:4px;
    padding:5px 10px; font-size:12px; cursor:pointer; color:#555;
  }
  .btn-icon:hover { border-color:#aaa; color:#333 }

  /* ── Gateway cards grid ──────────────────────────────────── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    padding: 20px 24px;
  }

  .gw-card {
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.07);
    transition: box-shadow .2s;
  }
  .gw-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1) }
  .gw-card.state-error   { border-left: 4px solid #ef4444 }
  .gw-card.state-connected { border-left: 4px solid #22c55e }
  .gw-card.state-disconnected { border-left: 4px solid #888 }
  .gw-card.state-disabled { border-left: 4px solid #ccc; opacity:.7 }

  /* Card header */
  .gw-card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px 10px;
  }
  .proto-badge {
    font-size: 10px; font-weight: 700; letter-spacing: .05em;
    padding: 3px 8px; border-radius: 4px;
    text-transform: uppercase; flex-shrink: 0;
  }
  .proto-modbus-tcp  { background:#dbeafe; color:#1d4ed8 }
  .proto-modbus-rtu  { background:#ede9fe; color:#6d28d9 }
  .proto-modbus-tcp-server { background:#bfdbfe; color:#1e40af }
  .proto-modbus-rtu-server { background:#ddd6fe; color:#5b21b6 }
  .proto-opc-ua      { background:#fef3c7; color:#92400e }
  .proto-opc-ua-server { background:#fde68a; color:#92400e }
  .proto-mqtt        { background:#dcfce7; color:#166534 }
  .proto-mqtt-broker { background:#bbf7d0; color:#14532d }
  .proto-profinet    { background:#ffedd5; color:#9a3412 }
  .proto-ethernetip  { background:#fce7f3; color:#9d174d }
  .proto-canopen     { background:#e0f2fe; color:#0369a1 }

  .gw-id { font-weight:600; font-size:14px; flex:1; color:#111 }

  .state-dot {
    width:10px; height:10px; border-radius:50%; flex-shrink:0;
  }
  .dot-connected    { background:#22c55e }
  .dot-disconnected { background:#888 }
  .dot-error        { background:#ef4444 }
  .dot-disabled     { background:#ccc }

  /* Stats row */
  .gw-stats {
    display: flex; gap:0;
    border-top: 1px solid #f0f0f0;
    border-bottom: 1px solid #f0f0f0;
  }
  .gw-stat {
    flex:1; text-align:center; padding:8px 4px;
    border-right: 1px solid #f0f0f0;
  }
  .gw-stat:last-child { border-right:none }
  .gw-stat .sv { font-size:16px; font-weight:700; color:#111;
                 font-variant-numeric:tabular-nums }
  .gw-stat .sl { font-size:10px; color:#999; text-transform:uppercase;
                 letter-spacing:.05em; margin-top:1px }
  .gw-stat.err .sv { color:#ef4444 }

  /* Error message */
  .gw-error {
    margin: 8px 16px;
    background: #fff5f5; border: 1px solid #fca5a5;
    border-radius:4px; padding:6px 10px;
    font-size:12px; color:#b91c1c;
    display:none;
  }

  /* Card footer */
  .gw-footer {
    display:flex; align-items:center; gap:8px;
    padding: 10px 16px;
  }
  .gw-footer .last-ok {
    font-size:11px; color:#999; margin-left:auto;
  }

  /* ── Config panel (expandable) ───────────────────────────── */
  .gw-config {
    border-top: 1px solid #e8e8e8;
    padding: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease, padding .3s;
  }
  .gw-config.open {
    max-height: 600px;
    padding: 16px;
  }
  .cfg-title {
    font-size:11px; font-weight:700; text-transform:uppercase;
    letter-spacing:.06em; color:#888; margin-bottom:12px;
  }
  .cfg-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .cfg-field { display:flex; flex-direction:column; gap:4px }
  .cfg-field.full { grid-column: span 2 }
  .cfg-field label { font-size:11px; color:#666; font-weight:500 }
  .cfg-field input, .cfg-field select {
    background:#f8f8f8; border:1px solid #ddd; border-radius:4px;
    padding:6px 10px; font-size:13px; color:#111;
  }
  .cfg-field input:focus, .cfg-field select:focus {
    outline:none; border-color:var(--oso-red);
  }
  .cfg-actions {
    display:flex; gap:8px; margin-top:14px; justify-content:flex-end;
  }
  .btn-save {
    background:var(--oso-red); color:#fff; border:none;
    border-radius:4px; padding:7px 18px; font-size:13px; cursor:pointer;
  }
  .btn-save:hover { background:var(--oso-red2) }
  .btn-cancel-cfg {
    background:#fff; color:#555; border:1px solid #ccc;
    border-radius:4px; padding:7px 14px; font-size:13px; cursor:pointer;
  }

  /* ── Empty state ─────────────────────────────────────────── */
  .empty-state {
    text-align:center; padding:60px 24px; color:#aaa;
  }
  .empty-state .icon { font-size:48px; margin-bottom:12px }
  .empty-state p { font-size:14px; margin-bottom:16px }

  /* ── Modal (add gateway) ─────────────────────────────────── */
  .modal-bg {
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.45); z-index:100;
    align-items:center; justify-content:center;
  }
  .modal-bg.open { display:flex }
  .modal {
    background:#fff; border-radius:8px; padding:24px;
    min-width:360px; max-width:480px; width:100%;
    box-shadow:0 8px 32px rgba(0,0,0,.2);
    display:flex; flex-direction:column; gap:16px;
  }
  .modal h3 { font-size:16px; font-weight:600; margin:0 }
  .modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:4px }
</style>
</head>
<body>

<!-- Header -->

,-1.047446 0.9928,-2.40286 -0.14263,-3.538307 -1.10367,-1.103666 -2.12143,-1.134584 -3.34889,-0.101716 -1.85609,1.561792 -0.79278,4.387303 1.65106,4.387303 0.75477,0 1.32454,-0.231335 1.84046,-0.747257 z m 16.08773,-10.288658 c 1.71546,-1.543394 0.63237,-4.49047 -1.6503,-4.49047 -1.21218,0 -2.73037,1.438881 -2.73037,2.587733 0,1.132053 1.51858,2.587733 2.69956,2.587733 0.52528,0 1.2463,-0.293792 1.68111,-0.684996 z"/>

<!-- Toolbar -->
<div class="toolbar">
  <h2>Configured gateways</h2>
  <button class="btn-secondary" onclick="fetchAll()">↺ Refresh</button>
  <button class="btn-primary" onclick="openAddModal()">+ Add gateway</button>
</div>

<!-- Cards -->
<div class="cards-grid" id="cardsGrid">
  <div style="grid-column:1/-1;text-align:center;padding:40px;color:#aaa">Loading…</div>
</div>

<!-- Add gateway modal -->
<div class="modal-bg" id="addModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3>Add gateway</h3>
    <div class="cfg-grid">
      <div class="cfg-field full">
        <label>Gateway ID</label>
        <input type="text" id="newId" placeholder="e.g. modbus-1">
      </div>
      <div class="cfg-field full">
        <label>Protocol</label>
        <select id="newProto" onchange="renderNewFields()">
          <option value="modbus-tcp">Modbus TCP — Client / Master</option>
          <option value="modbus-tcp-server">Modbus TCP — Server / Slave</option>
          <option value="modbus-rtu">Modbus RTU — Client / Master</option>
          <option value="modbus-rtu-server">Modbus RTU — Server / Slave</option>
          <option value="opc-ua">OPC-UA Client</option>
          <option value="opc-ua-server">OPC-UA Server</option>
          <option value="mqtt">MQTT Client</option>
          <option value="mqtt-broker">MQTT Broker</option>
          <option value="profinet">PROFINET</option>
          <option value="ethernetip">EtherNet/IP</option>
          <option value="canopen">CANopen</option>
        </select>
      </div>
      <div id="newFields" class="cfg-field full" style="display:contents"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel-cfg" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="addGateway()">Add</button>
    </div>
  </div>
</div>

<script>
const BASE = '/api/v1';
const POLL_MS = 5000;

let gateways = [];
let openConfigs = new Set();  // gateway ids with config panel open
let pollTimer = null;

// ── Boot ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  fetchAll();
  pollTimer = setInterval(fetchAll, POLL_MS);
  renderNewFields();
});

// ── REST ───────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

async function fetchAll() {
  try {
    gateways = await api('GET', '/gateways');
    renderCards();
    const connected = gateways.filter(g => g.state === 'connected').length;
    const errors    = gateways.filter(g => g.state === 'error').length;
    document.getElementById('gwSummary').textContent =
      `${gateways.length} gateways · ${connected} connected` +
      (errors ? ` · ${errors} error${errors > 1 ? 's' : ''}` : '');
  } catch(e) {
    document.getElementById('gwSummary').textContent = 'Error: ' + e.message;
  }
}

async function restartGateway(id) {
  try {
    await api('POST', `/gateways/${id}/restart`);
    fetchAll();
  } catch(e) { alert('Restart failed: ' + e.message) }
}

async function saveConfig(id) {
  const cfg = readFormConfig(id);
  try {
    await api('PUT', `/gateways/${id}`, cfg);
    openConfigs.delete(id);
    fetchAll();
  } catch(e) { alert('Save failed: ' + e.message) }
}

async function addGateway() {
  const id    = document.getElementById('newId').value.trim();
  const proto = document.getElementById('newProto').value;
  if (!id) { alert('Gateway ID is required'); return; }
  const cfg = readNewFormConfig();
  try {
    await api('PUT', `/gateways/${id}`, { protocol: proto, config: cfg });
    closeModal();
    fetchAll();
  } catch(e) { alert('Add failed: ' + e.message) }
}

// ── Render ─────────────────────────────────────────────────
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  if (!gateways.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="icon">⚡</div>
        <p>No gateways configured yet.</p>
        <button class="btn-primary" onclick="openAddModal()">+ Add first gateway</button>
      </div>`;
    return;
  }
  grid.innerHTML = gateways.map(g => renderCard(g)).join('');
}

function renderCard(g) {
  const st  = g.state || 'disconnected';
  const cfg = g.config || {};
  const stats = g.stats || {};
  const isOpen = openConfigs.has(g.id);

  const errorHtml = (st === 'error' && g.error_msg)
    ? `<div class="gw-error" style="display:block">${esc(g.error_msg)}</div>` : '';

  const lastOk = stats.last_ok_ts
    ? `Last OK: ${fmtAge(Date.now() - stats.last_ok_ts)}` : '';

  return `
  <div class="gw-card state-${st}" id="card-${esc(g.id)}">
    <div class="gw-card-header">
      <span class="proto-badge proto-${g.protocol}">${protoLabel(g.protocol)}</span>
      <span class="gw-id">${esc(g.id)}</span>
      <span class="state-dot dot-${st}" title="${st}"></span>
    </div>
    <div style="padding:0 16px 6px;font-size:12px;color:#777">${cfgSummary(g.protocol, cfg)}</div>
    ${errorHtml}
    <div class="gw-stats">
      <div class="gw-stat">
        <div class="sv">${fmtNum(stats.tx_count ?? 0)}</div>
        <div class="sl">TX</div>
      </div>
      <div class="gw-stat">
        <div class="sv">${fmtNum(stats.rx_count ?? 0)}</div>
        <div class="sl">RX</div>
      </div>
      <div class="gw-stat ${(stats.error_count||0) > 0 ? 'err' : ''}">
        <div class="sv">${fmtNum(stats.error_count ?? 0)}</div>
        <div class="sl">Errors</div>
      </div>
    </div>
    <div class="gw-footer">
      <button class="btn-icon" onclick="toggleConfig('${esc(g.id)}')">
        ${isOpen ? '▲ Hide config' : '▼ Config'}
      </button>
      <button class="btn-icon" onclick="restartGateway('${esc(g.id)}')">↺ Restart</button>
      <span class="last-ok">${lastOk}</span>
    </div>
    <div class="gw-config${isOpen ? ' open' : ''}" id="cfg-${esc(g.id)}">
      <div class="cfg-title">Configuration — ${protoLabel(g.protocol)}</div>
      <div class="cfg-grid">${cfgFields(g.id, g.protocol, cfg)}</div>
      <div class="cfg-actions">
        <button class="btn-cancel-cfg" onclick="toggleConfig('${esc(g.id)}')">Cancel</button>
        <button class="btn-save" onclick="saveConfig('${esc(g.id)}')">Save & apply</button>
      </div>
    </div>
  </div>`;
}

function toggleConfig(id) {
  if (openConfigs.has(id)) openConfigs.delete(id);
  else openConfigs.add(id);
  renderCards();
}

// ── Protocol-specific config forms ─────────────────────────
const PROTO_FIELDS = {
  'modbus-tcp': [
    { id:'host',     label:'Host / IP',   type:'text',   placeholder:'192.168.1.100' },
    { id:'port',     label:'Port',         type:'number', placeholder:'502', half:true },
    { id:'slave_id', label:'Slave ID',     type:'number', placeholder:'1',   half:true },

function cfgFields(gwId, proto, current) {
  const fields = PROTO_FIELDS[proto] || [];
  return fields.map(f => {
    const val = current[f.id] ?? '';
    const cls = f.full ? 'cfg-field full' : 'cfg-field';
    const inputId = `cfg_${gwId}_${f.id}`;
    if (f.type === 'select') {
      const opts = f.options.map(o =>
        `<option${String(val) === o ? ' selected' : ''}>${o}</option>`).join('');
      return `<div class="${cls}"><label>${f.label}</label>
        <select id="${inputId}">${opts}</select></div>`;
    }
    return `<div class="${cls}"><label>${f.label}</label>
      <input type="${f.type}" id="${inputId}" value="${esc(String(val))}" placeholder="${f.placeholder||''}"></div>`;
  }).join('');
}

function readFormConfig(gwId) {
  const gw = gateways.find(g => g.id === gwId);
  if (!gw) return {};
  const fields = PROTO_FIELDS[gw.protocol] || [];
  const cfg = {};
  fields.forEach(f => {
    const el = document.getElementById(`cfg_${gwId}_${f.id}`);
    if (el) cfg[f.id] = f.type === 'number' ? Number(el.value) : el.value;
  });
  return { config: cfg };
}

function renderNewFields() {
  const proto = document.getElementById('newProto').value;
  const fields = PROTO_FIELDS[proto] || [];
  const cont = document.getElementById('newFields');
  cont.innerHTML = fields.map(f => {
    const cls = f.full ? 'cfg-field full' : 'cfg-field';
    if (f.type === 'select') {
      const opts = f.options.map(o => `<option>${o}</option>`).join('');
      return `<div class="${cls}"><label>${f.label}</label>
        <select id="new_${f.id}">${opts}</select></div>`;
    }
    return `<div class="${cls}"><label>${f.label}</label>
      <input type="${f.type}" id="new_${f.id}" placeholder="${f.placeholder||''}"></div>`;
  }).join('');
}

function readNewFormConfig() {
  const proto = document.getElementById('newProto').value;
  const fields = PROTO_FIELDS[proto] || [];
  const cfg = {};
  fields.forEach(f => {
    const el = document.getElementById(`new_${f.id}`);
    if (el) cfg[f.id] = f.type === 'number' ? Number(el.value) : el.value;
  });
  return cfg;
}

// ── Modal ──────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('newId').value = '';
  renderNewFields();
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('newId').focus(), 50);
}
function closeModal() {
  document.getElementById('addModal').classList.remove('open');
}

// ── Utils ──────────────────────────────────────────────────
const PROTO_LABELS = {
  'modbus-tcp': 'Modbus TCP · Master', 'modbus-tcp-server': 'Modbus TCP · Server',
  'modbus-rtu': 'Modbus RTU · Master', 'modbus-rtu-server': 'Modbus RTU · Server',
  'opc-ua': 'OPC-UA Client', 'opc-ua-server': 'OPC-UA Server',
  'mqtt': 'MQTT Client', 'mqtt-broker': 'MQTT Broker', 'profinet': 'PROFINET',
  'ethernetip': 'EtherNet/IP', 'canopen': 'CANopen',
};
function protoLabel(p) { return PROTO_LABELS[p] || p }

function cfgSummary(proto, cfg) {
  if (proto === 'modbus-tcp')  return `${cfg.host||'—'}:${cfg.port||502}  slave ${cfg.slave_id||1}`;
  if (proto === 'modbus-rtu')  return `${cfg.serial_port||'—'}  ${cfg.baud_rate||9600} baud`;
  if (proto === 'modbus-tcp-server') return `serve ${cfg.bind_address||'0.0.0.0'}:${cfg.port||502}  unit ${cfg.unit_id||1}  · ${cfg.expose_tags||'*'}`;
  if (proto === 'modbus-rtu-server') return `serve ${cfg.serial_port||'—'}  ${cfg.baud_rate||9600} baud  unit ${cfg.unit_id||1}`;
  if (proto === 'opc-ua')      return cfg.endpoint_url || '—';
  if (proto === 'opc-ua-server') return `serve :${cfg.port||4840}  ${cfg.namespace_uri||'urn:osologic:platform'}  · ${cfg.auth||'Anonymous'}`;
  if (proto === 'mqtt')        return `${cfg.host||'—'}:${cfg.port||1883}  ${cfg.topic_prefix||''}`;
  if (proto === 'mqtt-broker') return `broker :${cfg.port||1883}${cfg.ws_port?(' · ws :'+cfg.ws_port):''}  ${cfg.topic_prefix||''}`;
  if (proto === 'profinet')    return `${cfg.interface||'eth0'}  ${cfg.station_name||'—'}`;
  if (proto === 'ethernetip')  return `${cfg.host||'—'}  slot ${cfg.slot??0}`;
  if (proto === 'canopen')     return `${cfg.interface||'can0'}  node ${cfg.node_id||1}  ${cfg.bitrate||250}k`;
  return '';
}

function fmtNum(n) {
  return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(1)+'k' : String(n);
}
function fmtAge(ms) {
  if (ms < 1000)    return '< 1s';
  if (ms < 60000)   return Math.floor(ms/1000) + 's ago';
  if (ms < 3600000) return Math.floor(ms/60000) + 'm ago';
  return Math.floor(ms/3600000) + 'h ago';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

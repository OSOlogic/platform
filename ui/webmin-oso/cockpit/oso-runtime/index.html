<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSOlogic Runtime</title>
<script src="../base/cockpit.js"></script>
<style>
  :root{--bg:#0e0f12;--panel:#16181d;--panel-2:#1c1f26;--line:#2a2e37;--ink:#ece9e3;--muted:#8b8f99;
    --accent:#3d8bfd;--brand:#a11313;--good:#46d17f;--bad:#e5484d;--warn:#e6a417;
    --mono:ui-monospace,"Cascadia Code",Menlo,Consolas,monospace;--sans:"Segoe UI",system-ui,sans-serif}
  :root[data-theme="light"]{--bg:#f6f7f9;--panel:#fff;--panel-2:#f1f3f5;--line:#dee2e6;--ink:#1c2024;--muted:#6c757d}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.5}
  a{color:inherit;text-decoration:none}
  .hdr{display:flex;align-items:center;gap:12px;padding:12px 24px;border-bottom:1px solid var(--line)}
  .hdr .brand{display:flex;align-items:center;gap:9px}.hdr img{width:30px;height:23px}
  .logo{font-weight:800;font-size:18px}.logo b{color:var(--accent)}
  .krumb{margin-left:18px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .krumb a{color:var(--muted)}.krumb a:hover{color:var(--accent)}
  .toggle{width:32px;height:32px;border:1px solid var(--line);background:var(--panel);border-radius:8px;color:var(--ink);cursor:pointer;margin-left:auto}
  .titlebar{padding:18px 24px 0}.titlebar h1{font-size:23px;margin:0;letter-spacing:-.02em}.titlebar h1 em{font-style:normal;color:var(--accent)}
  .titlebar .sub{color:var(--muted);font-size:13px;margin-top:3px}
  .pf-v5-l-page__main-section{padding:18px 24px 40px !important;max-width:900px}
  /* PatternFly component classes, restyled to the OSOlogic system */
  .pf-v5-c-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .pf-v5-c-card__header{padding:13px 16px;border-bottom:1px solid var(--line)}
  .pf-v5-c-card__title,.pf-v5-c-title{margin:0;font-size:15px;font-weight:700}
  .pf-v5-c-card__body{padding:16px}
  .pf-v5-c-button{border:1px solid var(--line);background:var(--panel-2);color:var(--ink);border-radius:8px;padding:7px 15px;cursor:pointer;font-size:13px;font-weight:600}
  .pf-v5-c-button:hover{filter:brightness(1.08)}
  .pf-v5-c-button.pf-m-primary,.oso-btn-start{background:var(--good) !important;border-color:var(--good) !important;color:#08120b !important}
  .pf-v5-c-button.pf-m-secondary{background:var(--panel-2);color:var(--ink)}
  .pf-v5-c-button.pf-m-warning{background:var(--warn);border-color:var(--warn);color:#111}
  .pf-v5-c-alert{background:color-mix(in srgb,var(--bad) 12%,var(--panel));border:1px solid color-mix(in srgb,var(--bad) 40%,var(--line));border-radius:10px;padding:10px 14px;display:flex;gap:9px;align-items:center}
  .pf-v5-c-alert__title{margin:0;color:var(--bad);font-size:13px}
  .pf-v5-c-table{width:100%;border-collapse:collapse;font-size:13px}
  .pf-v5-c-table__th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;padding:11px 14px;border-bottom:1px solid var(--line)}
  .pf-v5-c-table__td{padding:9px 14px;border-bottom:1px solid var(--line)}
  .pf-v5-c-table__tbody .pf-v5-c-table__tr:last-child .pf-v5-c-table__td{border-bottom:none}
  .pf-v5-c-table__tbody .pf-v5-c-table__tr:hover{background:var(--panel-2)}
  /* custom */
  .oso-badge{font-family:var(--mono);font-size:12px;font-weight:700;border-radius:999px;padding:4px 12px;letter-spacing:.04em}
  .oso-badge-stopped{background:var(--panel-2);color:var(--muted);border:1px solid var(--line)}
  .oso-badge-running{background:color-mix(in srgb,var(--good) 18%,var(--panel));color:var(--good);border:1px solid color-mix(in srgb,var(--good) 45%,var(--line))}
  .oso-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-top:18px}
  .oso-stat{background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:14px 16px;text-align:center}
  .oso-stat .val{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--accent)}
  .oso-stat .lbl{color:var(--muted);font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
</style>
</head>
<body>
<header class="hdr">
  <a href="../../index.html" class="brand"><img src="../../../shared/oso-mark.svg" alt="OSOLogic" onerror="this.style.display='none'"><span class="logo">OSO<b>logic</b></span></a>
  <span class="krumb"><a href="/">Home</a> › <a href="../../index.html">Admin</a> › Runtime</span>
  <button class="toggle" id="themeBtn" title="Theme">◐</button>
</header>
<div class="titlebar"><h1>Runtime <em>· scan cycle &amp; tasks</em></h1><div class="sub" id="devMeta">—</div></div>
<script>(function(){var r=document.documentElement,t=localStorage.getItem('oso-theme');if(t)r.setAttribute('data-theme',t);document.addEventListener('click',function(e){if(e.target&&e.target.id==='themeBtn'){var n=r.getAttribute('data-theme')==='light'?'dark':'light';r.setAttribute('data-theme',n);localStorage.setItem('oso-theme',n);}});})();</script>
</div>

<!-- PF Page content -->
<div class="pf-v5-l-page__main-section pf-m-light" style="padding: 0 24px 24px;">

  <!-- Alert for errors -->
  <div id="errorAlert" class="pf-v5-c-alert pf-m-danger pf-m-inline" style="display:none;margin-bottom:16px">
    <div class="pf-v5-c-alert__icon"><i class="fas fa-fw fa-exclamation-circle" aria-hidden="true"></i></div>
    <p class="pf-v5-c-alert__title" id="errorMsg"></p>
  </div>

  <!-- Control card -->
  <div class="pf-v5-c-card" style="margin-bottom:16px">
    <div class="pf-v5-c-card__header">
      <div class="pf-v5-c-card__title">
        <h2 class="pf-v5-c-title pf-m-md">Scan Cycle Control</h2>
      </div>
    </div>
    <div class="pf-v5-c-card__body">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span class="oso-badge oso-badge-stopped" id="rtBadge">STOPPED</span>
        <button class="pf-v5-c-button pf-m-primary oso-btn-start" onclick="rtCmd('start')">
          Start
        </button>
        <button class="pf-v5-c-button pf-m-secondary" onclick="rtCmd('stop')">
          Stop
        </button>
        <button class="pf-v5-c-button pf-m-warning" onclick="rtCmd('reset')">
          Reset
        </button>
      </div>

      <div class="oso-stats">
        <div class="oso-stat">
          <div class="val" id="rtCycle">—</div>
          <div class="lbl">Cycle (ms)</div>
        </div>
        <div class="oso-stat">
          <div class="val" id="rtLast">—</div>
          <div class="lbl">Last exec (µs)</div>
        </div>
        <div class="oso-stat">
          <div class="val" id="rtCount">—</div>
          <div class="lbl">Total cycles</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tasks card -->
  <div class="pf-v5-c-card">
    <div class="pf-v5-c-card__header">
      <div class="pf-v5-c-card__title">
        <h2 class="pf-v5-c-title pf-m-md">Tasks</h2>
      </div>
    </div>
    <div class="pf-v5-c-card__body" style="padding:0">
      <table class="pf-v5-c-table pf-m-compact pf-m-grid-md" style="width:100%">
        <thead class="pf-v5-c-table__thead">
          <tr class="pf-v5-c-table__tr">
            <th class="pf-v5-c-table__th">Name</th>
            <th class="pf-v5-c-table__th">State</th>
            <th class="pf-v5-c-table__th">Priority</th>
            <th class="pf-v5-c-table__th">Period (ms)</th>
            <th class="pf-v5-c-table__th">Last exec (µs)</th>
          </tr>
        </thead>
        <tbody class="pf-v5-c-table__tbody" id="tasksBody">
          <tr class="pf-v5-c-table__tr">
            <td colspan="5" style="padding:16px;color:#888;text-align:center">Loading…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
const BASE = '/api/v1';
const POLL_MS = 2000;

// ── Boot ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  fetchInfo();
  fetchRuntime();
  setInterval(fetchRuntime, POLL_MS);
  connectWS();
});

// ── Helpers ────────────────────────────────────────────────
async function api(method, path) {
  const r = await fetch(BASE + path, { method });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

function showError(msg) {
  document.getElementById('errorAlert').style.display = '';
  document.getElementById('errorMsg').textContent = msg;
}

// ── System info ────────────────────────────────────────────
async function fetchInfo() {
  try {
    const d = await api('GET', '/system/info');
    document.getElementById('devMeta').textContent =
      `${d.device} · ${d.platform} · fw ${d.firmware}`;
  } catch(e) {}
}

// ── Runtime ─────────────────────────────────────────────────
async function fetchRuntime() {
  try {
    const d = await api('GET', '/runtime/status');
    applyStatus(d);
  } catch(e) {
    showError('Cannot reach OSOlogic API: ' + e.message);
  }
}

async function rtCmd(cmd) {
  try {
    const d = await api('POST', '/runtime/' + cmd);
    applyStatus(d);
  } catch(e) {
    showError(cmd + ' failed: ' + e.message);
  }
}

function applyStatus(d) {
  const badge = document.getElementById('rtBadge');
  badge.textContent = d.state.toUpperCase();
  badge.className = 'oso-badge oso-badge-' + d.state;
  document.getElementById('rtCycle').textContent = d.cycle_ms ?? '—';
  document.getElementById('rtLast').textContent =
    d.last_cycle_us != null ? d.last_cycle_us.toLocaleString() : '—';
  document.getElementById('rtCount').textContent =
    d.cycle_count != null ? d.cycle_count.toLocaleString() : '—';

  if (d.error_msg) showError(d.error_msg);

  renderTasks(d.tasks || []);
}

function renderTasks(tasks) {
  const body = document.getElementById('tasksBody');
  if (!tasks.length) {
    body.innerHTML = '<tr class="pf-v5-c-table__tr"><td colspan="5" style="padding:16px;color:#888;text-align:center">No tasks</td></tr>';
    return;
  }
  const stateColor = { active: '#22c55e', idle: '#888', error: '#fca5a5' };
  body.innerHTML = tasks.map(t => `
    <tr class="pf-v5-c-table__tr">
      <td class="pf-v5-c-table__td" style="font-family:monospace;font-weight:600">${esc(t.name)}</td>
      <td class="pf-v5-c-table__td" style="color:${stateColor[t.state]||'#888'}">${t.state}</td>
      <td class="pf-v5-c-table__td">${t.priority ?? '—'}</td>
      <td class="pf-v5-c-table__td">${t.period_ms ?? '—'}</td>
      <td class="pf-v5-c-table__td" style="font-variant-numeric:tabular-nums">${t.last_exec_us != null ? t.last_exec_us.toLocaleString() : '—'}</td>
    </tr>
  `).join('');
}

// ── WebSocket (runtime_event only) ─────────────────────────
function connectWS() {
  const ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'runtime_event') fetchRuntime();
    } catch(_) {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OSOLogic — Home</title>
<style>
  :root{--bg:#0e0f12;--panel:#16181d;--panel-2:#1c1f26;--line:#2a2e37;--ink:#ece9e3;--muted:#8b8f99;
    --accent:#c23434;--accent-2:#e05a5a;--brand:#a11313;--good:#46d17f;--warn:#e6a417;--mono:ui-monospace,Menlo,Consolas,monospace;--sans:"Segoe UI",system-ui,sans-serif}
  :root[data-theme="light"]{--bg:#f8f9fa;--panel:#fff;--panel-2:#f1f3f5;--line:#dee2e6;--ink:#212529;--muted:#6c757d;--brand:#800000}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px}
  a{color:inherit;text-decoration:none}.wrap{max-width:1080px;margin:0 auto;padding:0 24px}
  header{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:1px solid var(--line)}
  header img{width:34px;height:26px}.logo{font-weight:800;font-size:19px}.logo b{color:var(--accent)}.reg{font-size:.55em;vertical-align:super;color:var(--muted)}
  .pill{font-family:var(--mono);font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 11px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:6px}.dot.ok{background:var(--good)}
  .grow{flex:1}
  .palette{display:flex;gap:5px}.palette button{width:14px;height:14px;border-radius:50%;border:1px solid var(--line);cursor:pointer;padding:0}.palette button.on{outline:2px solid var(--ink);outline-offset:1px}
  .toggle,.cfg{height:32px;border:1px solid var(--line);background:var(--panel);border-radius:8px;color:var(--ink);cursor:pointer}.toggle{width:32px}.cfg{padding:0 12px;font-size:13px}
  .cfg:hover{border-color:var(--accent)}
  h1{font-size:26px;letter-spacing:-.02em;margin:26px 0 4px}h1 em{font-style:normal;color:var(--accent)}
  .lede{color:var(--muted);margin:0 0 8px;max-width:72ch}
  .filters{display:flex;gap:6px;margin:20px 0 6px;flex-wrap:wrap}
  .filters button{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);border-radius:8px;padding:6px 12px;cursor:pointer;font-size:12.5px}
  .filters button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .cat{margin:22px 0 0}.cat h2{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 12px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}@media(max-width:820px){.grid{grid-template-columns:1fr 1fr}}@media(max-width:520px){.grid{grid-template-columns:1fr}}
  .app{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;display:flex;gap:13px;align-items:flex-start;transition:transform .14s,border-color .14s}
  .app.ok:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--accent) 50%,var(--line))}
  .app.dim{opacity:.62}.app.dim:hover{opacity:.85}
  .app .ic{font-size:24px;line-height:1;flex:0 0 auto}
  .app h3{margin:0 0 3px;font-size:15px;display:flex;align-items:center;gap:8px}.app p{margin:0;color:var(--muted);font-size:12.5px}
  .tag{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;padding:2px 6px;border-radius:999px;border:1px solid var(--line)}
  .tag.available{color:var(--good);border-color:color-mix(in srgb,var(--good) 45%,var(--line))}
  .tag.coming{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 45%,var(--line))}
  .tag.disabled{color:var(--muted)}
  .tag.external{color:var(--muted)}
  footer{color:var(--muted);font-size:13px;border-top:1px solid var(--line);margin-top:30px;padding:20px 0 46px}
  footer a:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="/ui/shared/oso-mark.svg" alt="OSOLogic" onerror="this.style.display='none'">
    <span class="logo">OSO<b>logic</b><span class="reg">®</span></span>
    <span class="pill" style="margin-left:6px"><span class="dot" id="dot"></span><span id="stat">checking…</span></span>
    <div class="grow"></div>
    <div class="palette" id="palette">
      <button data-accent="amber" style="background:#f48c06"></button><button data-accent="honey" style="background:#ffb300"></button>
      <button data-accent="maroon" style="background:#c23434"></button><button data-accent="bootstrap" style="background:#0d6efd"></button>
    </div>
    <a class="cfg" href="/ui/webmin-oso/services/index.html" title="Configure this launcher">⚙ Services</a>
    <button class="toggle" id="themeBtn">◐</button>
  </header>

  <h1>Welcome to <em>OSOLogic</em></h1>
  <p class="lede">Your automation platform and every interface, in one place. Open an app below — or
    <a href="/ui/webmin-oso/services/index.html" style="color:var(--accent)">configure this launcher</a>
    (what shows here, and each service) from osoadmin.</p>

  <div class="filters" id="filters">
    <button data-f="all" class="on">All</button>
    <button data-f="available">Available</button>
    <button data-f="coming">Coming soon</button>
  </div>

  <div id="cats"></div>

  <footer>© 2026 Roig Borrell S.L. · Ibercomp S.L. — <b style="color:var(--brand)">OSOLogic</b>® ·
    <a href="https://osologic.com">osologic.com</a> · <a href="https://github.com/OSOlogic/platform">GitHub</a></footer>
</div>

<script>
'use strict';
// Point every same-origin web tool at this instance's REST API.
try{ const c=JSON.parse(localStorage.getItem('osodb_client_cfg')||'{}'); c.baseUrl=location.origin; c.authType=c.authType||'none'; c.pollMs=c.pollMs||750; localStorage.setItem('osodb_client_cfg',JSON.stringify(c)); }catch(_){}

// Default service catalog (osoadmin's Services page edits localStorage 'oso-launcher',
// or the instance can serve /services.json). status: available | mockup | external.
const DEFAULT = { categories: [
  { name:'HMI & Operations', apps:[
    { icon:'🏭', name:'Plant Manager', desc:'Device tree + plant mimic, live', url:'/ui/hmi-web/plant-manager/index.html', status:'available' },
    { icon:'🖼️', name:'HMI · SVG', desc:'SVG mimic bound to tags', url:'/ui/hmi-web/svg-hmi/index.html', status:'available' },
    { icon:'🎛️', name:'HMI · HTML5', desc:'Widget board', url:'/ui/hmi-web/html5-hmi/index.html', status:'available' },
    { icon:'📊', name:'Dashboards', desc:'Node-RED Dashboard', url:'http://localhost:1880/dashboard', status:'available' },
    { icon:'🔔', name:'Alarms & Events', desc:'Threshold alarms, ack + history', url:'/ui/webmin-oso/alarms/index.html', status:'available' },
  ]},
  { name:'Start here', apps:[
    { icon:'🚀', name:'Get started', desc:'Docs & examples — HMIs, automations, scripting, dashboards', url:'/ui/get-started/index.html', status:'available' },
    { icon:'📖', name:'Documentation', desc:'Guides & API reference', url:'https://github.com/OSOlogic/platform', status:'external' },
  ]},
  { name:'Engineering', apps:[
    { icon:'🗂️', name:'Programs & Scripts', desc:'Ladder · ST · scripts · Node-RED', url:'/ui/webmin-oso/programs/index.html', status:'available' },
    { icon:'🪜', name:'Ladder editor', desc:'osoLadder — visual LD → ST', url:'/iec61131/ladder/osoLadder/index.html', status:'available' },
    { icon:'📐', name:'Structured Text', desc:'ST editor — check + osoST', url:'/ui/webmin-oso/st-editor/index.html', status:'available' },
    { icon:'🔴', name:'Node-RED', desc:'Flow editor & dashboards — DB-wired', url:'http://localhost:1880', status:'available' },
    { icon:'🧩', name:'Protocol builder', desc:'Custom serial/TCP protocols (RFC 0001)', url:'/ui/webmin-oso/protocol-builder/index.html', status:'available' },
  ]},
  { name:'Administration', apps:[
    { icon:'🔍', name:'Search', desc:'Global search — DB, config, real-time, alarms, logs', url:'/ui/webmin-oso/search/index.html', status:'available' },
    { icon:'⚙️', name:'osowebmin', desc:'System & HMI admin', url:'/ui/webmin-oso/index.html', status:'available' },
    { icon:'📜', name:'Script editor', desc:'Any language, run inline (osoadmin)', url:'/ui/webmin-oso/script-editor/index.html', status:'available' },
    { icon:'🏷️', name:'I/O Tags', desc:'Browse osodb, read/write', url:'/ui/webmin-oso/cockpit/oso-iotags/index.html', status:'available' },
    { icon:'▶️', name:'Runtime', desc:'Scan cycle, start/stop', url:'/ui/webmin-oso/cockpit/oso-runtime/index.html', status:'available' },
    { icon:'📦', name:'PLC Projects', desc:'Deploy compiled projects', url:'/ui/webmin-oso/cockpit/oso-plc-projects/index.html', status:'available' },
    { icon:'👥', name:'Users & Roles', desc:'DB roles & permissions (GRANTs)', url:'/ui/webmin-oso/users/index.html', status:'available' },
    { icon:'📁', name:'Logs', desc:'Viewer + retention (RAM/persistent, logrotate)', url:'/ui/webmin-oso/logs/index.html', status:'available' },
    { icon:'🗓️', name:'Scheduler', desc:'Scheduled tasks (oso-cron)', url:'/ui/webmin-oso/cron/index.html', status:'available' },
    { icon:'🕐', name:'Date & Time', desc:'Clock, timezone, NTP client/server', url:'/ui/webmin-oso/datetime/index.html', status:'available' },
    { icon:'🩺', name:'Watchdog', desc:'Service & process monitor + auto-restart', url:'/ui/webmin-oso/watchdog/index.html', status:'available' },
    { icon:'🗄️', name:'Database', desc:'osodb backend — MariaDB/PostgreSQL/SQLite/MCU', url:'/ui/webmin-oso/database/index.html', status:'available' },
    { icon:'⏱️', name:'Historian', desc:'Trends + time-series (InfluxDB/TimescaleDB/QuestDB)', url:'/ui/webmin-oso/historian/index.html', status:'available' },
  ]},
  { name:'Networking & Gateways', apps:[
    { icon:'🔌', name:'Gateways', desc:'Modbus · OPC-UA · MQTT · HA (server+client)', url:'/ui/webmin-oso/cockpit/oso-gateways/index.html', status:'available' },
    { icon:'🏠', name:'Home Assistant', desc:'Compatibility gateway — config', url:'/ui/webmin-oso/home-assistant/index.html', status:'available' },
    { icon:'📡', name:'Network scanner', desc:'Discover TCP/IP & serial devices', url:'/ui/webmin-oso/network-scanner/index.html', status:'available' },
    { icon:'🧱', name:'Firewall', desc:'iptables editor', url:'/ui/webmin-oso/firewall/index.html', status:'available' },
    { icon:'🛡️', name:'fail2ban', desc:'Intrusion protection — jails & bans', url:'/ui/webmin-oso/fail2ban/index.html', status:'available' },
  ]},
  { name:'Remote & network services', apps:[
    { icon:'🔐', name:'VPN', desc:'Client & server (tool TBD)', url:'#', status:'coming' },
    { icon:'☎️', name:'SIP', desc:'VoIP — server & client', url:'#', status:'coming' },
    { icon:'🔑', name:'SSH', desc:'Server, keys & SSH tunnels', url:'/ui/webmin-oso/ssh/index.html', status:'available' },
    { icon:'📂', name:'Samba', desc:'File server (SMB/CIFS)', url:'#', status:'coming' },
    { icon:'🎬', name:'Media server', desc:'Stream media', url:'#', status:'coming' },
    { icon:'🖥️', name:'Remote access', desc:'Remote desktop/support (tool TBD)', url:'#', status:'coming' },
  ]},
]};

let model = load(); let filter='all';
function load(){ try{const v=JSON.parse(localStorage.getItem('oso-launcher'));if(v&&v.categories)return v;}catch(_){}
  return DEFAULT; }
const LABEL={available:'available',coming:'coming soon',disabled:'not available',external:'external'};
const openable=s=>s==='available'||s==='external';

function render(){
  const root=document.getElementById('cats'); root.innerHTML='';
  model.categories.forEach(cat=>{
    const apps=cat.apps.filter(a=> filter==='all' || (filter==='available'? openable(a.status) : !openable(a.status)));
    if(!apps.length) return;
    const sec=document.createElement('div'); sec.className='cat';
    sec.innerHTML=`<h2>${esc(cat.name)}</h2><div class="grid"></div>`;
    const g=sec.querySelector('.grid');
    apps.forEach(a=>{
      const ok=openable(a.status)&&a.url&&a.url!=='#';
      const el=document.createElement(ok?'a':'div');
      el.className='app '+(openable(a.status)?'ok':'dim');
      if(ok){ el.href=a.url; if(a.status==='external')el.target='_blank'; }
      el.innerHTML=`<div class="ic">${a.icon||'🔧'}</div>
        <div><h3>${esc(a.name)} <span class="tag ${a.status}">${LABEL[a.status]||a.status}</span></h3><p>${esc(a.desc||'')}</p></div>`;
      g.appendChild(el);
    });
    root.appendChild(sec);
  });
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

document.querySelectorAll('#filters button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#filters button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); filter=b.dataset.f; render();
});

// theme + palette
const root=document.documentElement; const th=localStorage.getItem('oso-theme'); if(th)root.setAttribute('data-theme',th);
document.getElementById('themeBtn').onclick=()=>{const c=root.getAttribute('data-theme')||'dark';const n=c==='dark'?'light':'dark';root.setAttribute('data-theme',n);localStorage.setItem('oso-theme',n);};
const ACC={amber:['#f48c06','#ffb64d'],honey:['#ffb300','#ffcf4d'],maroon:['#c23434','#e05a5a'],bootstrap:['#0d6efd','#3d8bfd']};
function setAcc(n){const a=ACC[n]||ACC.maroon;root.style.setProperty('--accent',a[0]);root.style.setProperty('--accent-2',a[1]);localStorage.setItem('oso-accent',n);document.querySelectorAll('#palette button').forEach(b=>b.classList.toggle('on',b.dataset.accent===n));}
setAcc(localStorage.getItem('oso-accent')||'maroon');document.querySelectorAll('#palette button').forEach(b=>b.onclick=()=>setAcc(b.dataset.accent));

// try a served catalog, then health
fetch('/services.json').then(r=>r.ok?r.json():null).then(j=>{ if(j&&j.categories&&!localStorage.getItem('oso-launcher')){ model=j; render(); } }).catch(()=>{});
fetch('/healthz').then(r=>r.json()).then(d=>{ document.getElementById('dot').className='dot ok'; document.getElementById('stat').textContent=`live · ${d.tags} tags · db ${d.db?'up':'seed'}`; }).catch(()=>{ document.getElementById('stat').textContent='core offline'; });

render();
</script>
</body>
</html>

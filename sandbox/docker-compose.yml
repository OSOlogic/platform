# OSOLogic sandbox — one command, same result on Linux, Windows (Docker Desktop / WSL2) and macOS.
#   docker compose up --build      → UI+REST http://localhost:8080 · OPC-UA opc.tcp://localhost:4840 · DB :3306
# TODO: FIX ERRORS
name: osologic-sandbox
services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: osoroot
      MARIADB_DATABASE: osodb
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - osodb-data:/var/lib/mysql
    ports:
      - "3306:3306"          # control the plant with plain SQL from anywhere
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 30

  core:
    build: ./core
    environment:
      OSO_DB_HOST: db
      OSO_DB_USER: osoapp
      OSO_DB_PASS: osoapp
      OSO_DB_NAME: osodb
      OSO_UI_DIR: /repo
    ports:
      - "8080:8080"          # web UI + REST API
      - "4840:4840"          # OPC-UA server
    volumes:
      - ../:/repo:ro                         # serve the whole frontend (ui/ + iec61131/ editors)
      - ./web/index.html:/repo/index.html:ro # sandbox landing page
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Node-RED — flow editor & dashboards (Diego's PLCBorrell interface).
  # First boot auto-provisions Diego's flows (its custom TON/TOF blocks are
  # subflows inside flows.json) and installs the palette nodes they need
  # (node-red-contrib-mysql-config + Dashboard 2.0) via node-red/seed.sh — no
  # manual Manage-Palette/import steps. The MySQL config node targets host "db",
  # database "osodb".
  nodered:
    image: nodered/node-red:4
    ports:
      - "1880:1880"
    environment:
      TZ: Europe/Madrid
    volumes:
      - nodered-data:/data
      - ../ui/node-red:/reference:ro     # Diego's flows.json + package.json (seeded on first boot)
      - ./node-red/seed.sh:/seed.sh:ro   # first-boot provisioner (imports flows + installs palette)
    entrypoint: ["/bin/sh", "/seed.sh"]
    depends_on:
      - db
    restart: unless-stopped

volumes:
  osodb-data:
  nodered-data:
